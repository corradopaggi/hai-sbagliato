<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Hai sbagliato!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar Overlay -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-nav">
      <div class="sidebar-section">Menu</div>
      <a class="sidebar-item" href="index.html">
        <span class="sidebar-item-icon">🔴</span> Home
      </a>
      <a class="sidebar-item active" href="dashboard.html">
        <span class="sidebar-item-icon">📊</span> Dashboard
      </a>
    </div>
  </nav>

  <!-- Header -->
  <header class="header">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <h1 class="header-title"><span style="color: #FF9900;">Hai sbagliato!</span> tracker</h1>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="dashboard">
      <h1>📊 Dashboard Errori</h1>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="stat-today">-</span>
          <span class="stat-label">Oggi</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-week">-</span>
          <span class="stat-label">Questa settimana</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-month">-</span>
          <span class="stat-label">Questo mese</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-total">-</span>
          <span class="stat-label">Totale</span>
        </div>
      </div>

      <div class="mood-stats">
        <h2>📈 Statistiche per umore</h2>
        <div id="mood-bars"></div>
      </div>
    </div>
  </main>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }

    const moodEmojis = {
      'indifferenza': '😐',
      'tranquillità': '😌',
      'rabbia': '😡',
      'tristezza': '😢',
      'frustrazione': '😤',
      'noia': '🥱'
    };

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();

        document.getElementById('stat-today').textContent = data.today;
        document.getElementById('stat-week').textContent = data.week;
        document.getElementById('stat-month').textContent = data.month;
        document.getElementById('stat-total').textContent = data.total;

        const barsContainer = document.getElementById('mood-bars');
        if (data.moods.length === 0) {
          barsContainer.innerHTML = '<p class="no-data">Nessun dato ancora. Vai a sbagliare!</p>';
          return;
        }

        const maxCount = Math.max(...data.moods.map(m => m.count));
        barsContainer.innerHTML = data.moods.map(m => {
          const pct = Math.round((m.count / data.total) * 100);
          const barWidth = Math.round((m.count / maxCount) * 100);
          return `
            <div class="mood-bar-container mood-${m.mood}">
              <div class="mood-bar-header">
                <span>${moodEmojis[m.mood] || ''} ${m.mood}</span>
                <span>${m.count} (${pct}%)</span>
              </div>
              <div class="mood-bar">
                <div class="mood-bar-fill" style="width: ${barWidth}%"></div>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Errore caricamento stats:', err);
      }
    }

    loadStats();
  </script>
</body>
</html>
